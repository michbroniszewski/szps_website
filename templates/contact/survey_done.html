{% extends "base.html" %}

{% block title %}Dziękujemy! — Wydział Sędziowski ŚZPS{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 text-center">
      <div class="success-state py-5">
        <div class="success-icon mb-4">
          <i class="bi bi-check-circle-fill text-success"></i>
        </div>
        <h1 class="h2 fw-bold mb-3">Dziękujemy za wypełnienie ankiety!</h1>
        <p class="text-muted mb-4">
          Twoja odpowiedź została zarejestrowana. Twoja opinia jest dla nas bardzo ważna.
        </p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
          <a href="{% url 'home' %}" class="btn btn-primary btn-lg px-4">
            <i class="bi bi-house me-2"></i>Strona główna
          </a>
          <a href="{% url 'contact:contact' %}" class="btn btn-outline-secondary btn-lg px-4">
            <i class="bi bi-arrow-left me-2"></i>Powrót do kontaktu
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
