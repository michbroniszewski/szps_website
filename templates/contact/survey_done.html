{% extends "base.html" %}
{% block title %}Dziękujemy — Wydział Sędziowski ŚZPS{% endblock %}

{% block content %}
<section class="section section--light">
  <div class="container container--narrow">
    <div class="success-screen">
      <div class="success-screen__icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2.5"/>
          <path d="M20 32l9 9 15-15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="success-screen__title">Dziękujemy!</h1>
      <p class="success-screen__text">
        Twoja odpowiedź na ankietę została zapisana.<br>
        Twoja opinia jest dla nas ważna.
      </p>
      <div class="success-screen__actions">
        <a href="{% url 'home' %}" class="btn btn--primary">Strona główna →</a>
        <a href="{% url 'surveys:list' %}" class="btn btn--ghost">Powrót do ankiet</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
